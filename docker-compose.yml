version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vibechat-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      # Firebase
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-vibechat-version-1}
      - FIREBASE_CREDENTIALS_PATH=/app/firebase-credentials.json
      # AWS S3
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME:-vibechat-media}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      # YouTube API
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      # Mail
      - MAIL_EMAIL=${MAIL_EMAIL}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    volumes:
      # Persist SQLite database
      - vibechat-db:/app/database
      # Mount Firebase credentials (copy file to server)
      - ./backend/firebase-credentials.json:/app/firebase-credentials.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:5001}
        - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:5001}
    container_name: vibechat-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  vibechat-db:
    driver: local
