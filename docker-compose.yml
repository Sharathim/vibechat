services:
  postgres:
    image: postgres:16-alpine
    container_name: vibechat-postgres
    environment:
      POSTGRES_USER: vibechat
      POSTGRES_PASSWORD: vibechat_secret
      POSTGRES_DB: vibechat_auth
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - vibechat-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibechat -d vibechat_auth"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    image: vibechat-backend:local
    container_name: vibechat-backend
    env_file:
      - ./.env
    environment:
      HOST: 0.0.0.0
      PORT: 7002
      DATABASE_PATH: database/vibechat.db
      DATABASE_URL: postgresql://vibechat:vibechat_secret@postgres:5432/vibechat_auth
    ports:
      - "7002:7002"
    volumes:
      - ./backend/database:/app/database
      - ./firebase-credentials.json:/app/firebase-credentials.json
    dns:
      - 172.31.0.2
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - vibechat-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: bharath1303/vibechat-frontend:latest
    container_name: vibechat-frontend
    ports:
      - "7001:80"
    depends_on:
      - backend
    networks:
      - vibechat-network
    restart: unless-stopped

networks:
  vibechat-network:
    driver: bridge

volumes:
  pgdata: