name: VIbeChat CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Step 3: Build & Push Backend
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: true
          tags: bharath1303/vibechat-backend:latest

      # Step 4: Build & Push Frontend
      # VITE_API_URL uses /api prefix — nginx handles the proxy to backend
      # So we point it to the domain, not the backend container directly
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: true
          tags: bharath1303/vibechat-frontend:latest
          build-args: |
            VITE_API_URL=https://vibechat.ddns.net
            VITE_WS_URL=wss://vibechat.ddns.net

      # Step 5: Copy docker-compose.yml and .env to EC2
      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/vibechat-new"

      # Step 6: SSH into EC2 and deploy
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/vibechat-new

            # Write the .env file from GitHub Secrets
            cat > .env << 'EOF'
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            FLASK_ENV=production
            FLASK_DEBUG=0
            DATABASE_PATH=database/vibechat.db
            DATABASE_URL=postgresql://vibechat:vibechat_secret@postgres:5432/vibechat_auth
            HOST=0.0.0.0
            PORT=7002
            SESSION_COOKIE_NAME=vibechat_session
            SESSION_COOKIE_HTTPONLY=true
            SESSION_COOKIE_SAMESITE=Lax
            SESSION_COOKIE_SECURE=false
            MAIL_EMAIL=${{ secrets.MAIL_EMAIL }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_BUCKET_NAME=vibechat-media
            AWS_REGION=ap-south-1
            FRONTEND_URL=https://vibechat.ddns.net
            FRONTEND_URLS=https://vibechat.ddns.net,http://localhost:7001,http://127.0.0.1:7001
            FIREBASE_CREDENTIALS_PATH=./firebase-credentials.json
            FIREBASE_PROJECT_ID=vibechat-version-1
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            FIREBASE_CERTS_CACHE_PATH=database/firebase_certs_cache.json
            FIREBASE_CERTS_STALE_TTL_SECONDS=604800
            VITE_API_URL=https://vibechat.ddns.net
            VITE_WS_URL=wss://vibechat.ddns.net
            EOF

            # Pull latest images from DockerHub
            docker pull bharath1303/vibechat-backend:latest
            docker pull bharath1303/vibechat-frontend:latest

            # Restart all containers
            docker-compose down || true
            docker-compose up -d
            docker run --rm -v ~/vibechat-new/backend/database:/backup bharath1303/vibechat-backend:latest cp -r /app/database/. /backup/
            sudo systemctl restart nginx

            # Clean up old unused images
            docker image prune -f