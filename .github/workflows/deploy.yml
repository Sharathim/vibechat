name: Deploy to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Build frontend
      working-directory: ./frontend
      run: |
        npm ci
        npm run build
    
    - name: Install SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
    
    - name: Deploy to EC2
      run: |
        # Connect to EC2 and pull latest code, build, and restart services
        ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          set -e
          
          # Navigate to project directory
          cd ~/vibechat
          
          # Pull latest code
          echo "📥 Pulling latest code..."
          git fetch origin main
          git reset --hard origin/main
          
          # Stop services
          echo "⏹️  Stopping services..."
          pm2 stop all --silent || true
          
          # Install/update frontend dependencies and build
          echo "🔨 Building frontend..."
          cd frontend
          npm ci --omit=dev
          npm run build
          cd ..
          
          # Install/update backend dependencies
          echo "🔨 Installing backend dependencies..."
          cd backend
          pip install --upgrade pip
          pip install -q -r requirements.txt
          cd ..
          
          # Copy .env files (they should already exist on server)
          echo "✓ Environment files verified"
          
          # Start services
          echo "🚀 Starting services..."
          pm2 start "cd ~/vibechat/backend && python app.py" --name "vibechat-backend" || pm2 restart vibechat-backend
          pm2 start "cd ~/vibechat/frontend && npm run preview" --name "vibechat-frontend" || pm2 restart vibechat-frontend
          
          # Start Nginx
          echo "🌐 Restarting Nginx..."
          sudo systemctl restart nginx
          
          # Save PM2 process list
          pm2 save
          
          # Show status
          echo "✅ Deployment complete!"
          pm2 status
        EOF
    
    - name: Verify deployment
      run: |
        echo "🔍 Verifying deployment..."
        curl -s http://${{ secrets.EC2_HOST }}/health || echo "Health check endpoint not yet available"
    
    - name: Notify deployment
      if: success()
      run: echo "✅ Successfully deployed to EC2: ${{ secrets.EC2_HOST }}"
    
    - name: Notify failure
      if: failure()
      run: echo "❌ Deployment failed. Check logs above."
