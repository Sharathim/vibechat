name: VIbeChat CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check backend changes
        id: backend-changes
        uses: dorny/paths-filter@v2
        with:
          filters: |
            changed:
              - 'backend/**'

      - name: Build & Push Backend
        if: steps.backend-changes.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: true
          tags: bharath1303/vibechat-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check frontend changes
        id: frontend-changes
        uses: dorny/paths-filter@v2
        with:
          filters: |
            changed:
              - 'frontend/**'

      - name: Build & Push Frontend
        if: steps.frontend-changes.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: true
          tags: bharath1303/vibechat-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=https://vibechat.ddns.net
            VITE_WS_URL=wss://vibechat.ddns.net

  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/vibechat-new"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/vibechat-new

            cat > .env << 'EOF'
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            FLASK_ENV=production
            FLASK_DEBUG=0
            DATABASE_PATH=database/vibechat.db
            DATABASE_URL=postgresql://vibechat:vibechat_secret@postgres:5432/vibechat_auth
            HOST=0.0.0.0
            PORT=7002
            SESSION_COOKIE_NAME=vibechat_session
            SESSION_COOKIE_HTTPONLY=true
            SESSION_COOKIE_SAMESITE=Lax
            SESSION_COOKIE_SECURE=false
            MAIL_EMAIL=${{ secrets.MAIL_EMAIL }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_BUCKET_NAME=vibechat-media
            AWS_REGION=ap-south-1
            FRONTEND_URL=https://vibechat.ddns.net
            FRONTEND_URLS=https://vibechat.ddns.net,http://localhost:7001,http://127.0.0.1:7001
            FIREBASE_CREDENTIALS_PATH=./firebase-credentials.json
            FIREBASE_PROJECT_ID=vibechat-version-1
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            FIREBASE_CERTS_CACHE_PATH=database/firebase_certs_cache.json
            FIREBASE_CERTS_STALE_TTL_SECONDS=604800
            VITE_API_URL=https://vibechat.ddns.net
            VITE_WS_URL=wss://vibechat.ddns.net
            EOF

            docker pull bharath1303/vibechat-backend:latest
            docker pull bharath1303/vibechat-frontend:latest
            docker-compose down || true
            docker-compose up -d
            docker run --rm -v ~/vibechat-new/backend/database:/backup bharath1303/vibechat-backend:latest cp -r /app/database/. /backup/
            sleep 10 && docker-compose restart vibechat-backend
            sudo systemctl restart nginx
            docker image prune -f